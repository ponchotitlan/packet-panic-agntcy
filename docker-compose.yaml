services:
  # Gateway de mensajería SLIM: bus seguro entre el supervisor y el detector.
  slim:
    image: ghcr.io/agntcy/slim:1.4.0
    container_name: packetpanic-slim
    ports:
      - "46357:46357"
    volumes:
      - ./docker/slim-config.yaml:/config.yaml
    command: ["/slim", "--config", "/config.yaml"]

  # Agent Directory (AGNTCY dir): publicación y descubrimiento de agentes por capacidades (OASF)
  # Luego ejecuta la demo: ./scripts/directory_demo.sh
  directory:
    image: ghcr.io/agntcy/dir-ctl:v1.5.0
    container_name: packetpanic-directory
    command: ["daemon", "start"]
    volumes:
      - ./oasf:/oasf:ro
      - ./docker/certs:/certs:ro

  # Agente Detector: servidor A2A con acceso (simulado) a la red.
  detector:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: packetpanic-detector
    command: ["python", "-m", "detector.detector_server"]
    env_file:
      - .env
    environment:
      - DEFAULT_MESSAGE_TRANSPORT=SLIM
      - TRANSPORT_SERVER_ENDPOINT=http://slim:46357
      # Servidor MCP de pyATS para consultas reales a la red.
      - PYATS_MCP_ENABLED=true
      - PYATS_MCP_URL=http://pyats-mcp:${PYATS_MCP_PORT}/mcp
      # Colector OTLP/HTTP (Jaeger) dentro de la red de Compose.
      - OTLP_HTTP_ENDPOINT=http://jaeger:4318
      # Jaeger solo ingiere trazas; desactiva el export de métricas OTLP
      # (no tiene endpoint /v1/metrics) para evitar errores 404.
      - OBSERVE_METRICS_ENABLED=false
    volumes:
      # CAs corporativas (montadas, no horneadas). Coloca tus .pem/.crt aquí.
      - ./docker/certs:/certs:ro
    depends_on:
      - slim
      - pyats-mcp
      - jaeger

  # Agente Supervisor: API HTTP + cliente A2A que delega en el detector.
  supervisor:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: packetpanic-supervisor
    command: ["python", "-m", "supervisor.main"]
    env_file:
      - .env
    environment:
      - DEFAULT_MESSAGE_TRANSPORT=SLIM
      - TRANSPORT_SERVER_ENDPOINT=http://slim:46357
      - SUPERVISOR_HOST=0.0.0.0
      - SUPERVISOR_PORT=8000
      # Colector OTLP/HTTP (Jaeger) dentro de la red de Compose.
      - OTLP_HTTP_ENDPOINT=http://jaeger:4318
      # Jaeger solo ingiere trazas; desactiva el export de métricas OTLP
      # (no tiene endpoint /v1/metrics) para evitar errores 404.
      - OBSERVE_METRICS_ENABLED=false
    volumes:
      # CAs corporativas (montadas, no horneadas). Coloca tus .pem/.crt aquí.
      - ./docker/certs:/certs:ro
    ports:
      - "8000:8000"
    depends_on:
      - slim
      - detector
      - jaeger

  pyats-mcp:
    build:
      context: https://github.com/ponchotitlan/pyATS_MCP.git
      dockerfile: Dockerfile
    image: pyats-mcp:latest
    container_name: pyats-mcp
    environment:
      MCP_TRANSPORT: ${PYATS_MCP_TRANSPORT}
      MCP_HOST: ${PYATS_MCP_HOST}
      MCP_PORT: ${PYATS_MCP_PORT}
      PYATS_MCP_ARTIFACTS_DIR: /app/artifacts
      PYATS_MCP_KEEP_ARTIFACTS: ${PYATS_MCP_KEEP_ARTIFACTS}
    volumes:
      - ./testbed.yaml:/app/testbed.yaml:ro
    ports:
      - "${PYATS_MCP_PORT}:${PYATS_MCP_PORT}"
    restart: unless-stopped

  # Colector de trazas OTEL: Jaeger all-in-one con receptor OTLP habilitado.
  # Recibe las trazas del supervisor y del detector (OTLP/HTTP en 4318) y las
  # expone en la UI web (http://localhost:16686).
  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: packetpanic-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # UI web de Jaeger
      - "4318:4318"    # OTLP/HTTP
      - "4317:4317"    # OTLP/gRPC
    restart: unless-stopped
